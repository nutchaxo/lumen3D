<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRIBHM - Vérité Terrain (Deep Zoom)</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #000; overflow: hidden; }
        #viewer-container { width: 100%; height: 100%; }
        #overlay-ui { position: absolute; top: 10px; left: 10px; z-index: 10; color: white; font-family: sans-serif; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; }
    </style>
    <!-- Include OpenSeadragon -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/3.0.0/openseadragon.min.js" integrity="sha384-0TthTVAT+JjS3H3s6LZrp0NqOHpnOV00EYQPfel+8b7Sz8y4AkeEG8aNmC1LxBxs" crossorigin="anonymous"></script>
    <!-- BUG-058: i18n was referenced via data-i18n attributes but never loaded -->
    <script src="js/core/i18n.js?v=20260504"></script>
    <script src="js/components/deepzoom-viewer.js?v=20260504"></script>
</head>
<body>
    <div id="overlay-ui">
        <h3 data-i18n="deepzoom.title">Explorateur Z-Stack (Natif)</h3>
        <p id="meta-info" data-i18n="app.loading">Loading...</p>
        <button id="btn-sync-studio" data-i18n="deepzoom.studio2d">Ouvrir dans le Studio 2D</button>
    </div>
    <div id="viewer-container"></div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // BUG-058: translate the data-i18n labels. Await init so the JS-set
            // strings below resolve in the active language too.
            if (typeof I18n !== 'undefined') await I18n.init();
            const t = (k, def) => (typeof I18n !== 'undefined' && I18n.t && I18n.t(k) !== k) ? I18n.t(k) : def;
            DeepZoomViewer.init('viewer-container');

            // Simulation of loading a dataset
            const datasetUrl = "DATA_WEB/example/tiles2d/manifest.dzi"; // Remplacez par l'URL réelle

            // In a real scenario, you'd fetch the manifest first to get metadata
            document.getElementById('meta-info').innerText = t('deepzoom.mode', 'Mode: Deep Zoom OME-TIFF/DZI');

            // Load the image pyramid
            // DeepZoomViewer.load(datasetUrl);

            document.getElementById('btn-sync-studio').addEventListener('click', () => {
                const bounds = DeepZoomViewer.getViewportBounds();
                console.log("Sync requested for bounds:", bounds);
                alert(t('deepzoom.syncTodo', 'Studio sync (to be implemented: canvas transfer)'));
            });
        });
    </script>
</body>
</html>
