<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{SITE:pageTitles.explorer|Data Explorer — IRIBHM Microscopy}}</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Lucide Icons -->
  <script src="js/vendor/lucide.min.js" integrity="sha384-tTkFttkBclaU1cloKwOi9xk3pbao3VZxTjLNBt8iFABWDBQibbAbWpVmO28zMuxq" crossorigin="anonymous"></script>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/explorer.css">
  <link rel="stylesheet" href="css/tools.css">

  <style nonce="{{CSP_NONCE}}">
    body { padding-top: var(--header-height); }
  </style>
</head>
<body data-page="explorer">

  <!-- Navigation Bar -->
  <nav class="navbar" id="navbar" style="background: var(--bg-base); border-bottom: 1px solid var(--border-subtle);">
    <a href="index.html" class="navbar-brand">
      <div class="navbar-brand-icon" data-instance="brand.logoEmoji">🔬</div>
      <span data-instance="brand.organization">IRIBHM — ULB</span>
    </a>

    <div class="navbar-links">
      <a href="index.html" class="navbar-link" data-i18n="nav.home">Home</a>
      <a href="explorer.html" class="navbar-link active" data-i18n="nav.explorer">Data Explorer</a>
      <a href="compare.html" class="navbar-link" data-i18n="nav.compare">Compare</a>
      <a href="about.html" class="navbar-link" data-i18n="nav.about">About</a>
    </div>

    <div class="navbar-actions">
      <!-- Language Switcher -->
      <div class="dropdown" id="lang-dropdown">
        <button class="btn btn-icon btn-ghost" data-action="lang-dropdown" data-i18n-title="lang.switch">
          <i data-lucide="languages" style="width:20px;height:20px"></i>
        </button>
        <!-- Items are generated from the platform's discovered locales by
             Utils.populateLanguageMenu() — see explorer.js. -->
        <div class="dropdown-menu"></div>
      </div>

                  <!-- Color Blindness Toggle -->
      <button class="btn btn-icon btn-ghost" data-action="colorblind" data-i18n-title="colorblind.toggle">
        <i data-lucide="eye" style="width:20px;height:20px"></i>
      </button>

      <!-- Theme Toggle -->
      <button class="btn btn-icon btn-ghost" data-action="theme-toggle" data-i18n-title="theme.toggle" id="theme-toggle">
        <i data-lucide="moon" style="width:20px;height:20px" data-theme-icon></i>
      </button>
    </div>
  </nav>

  <main class="container">
    <div style="margin-top: var(--space-8);">
      <h1 data-i18n="explorer.title">Data Explorer</h1>
      <p style="color: var(--text-secondary);" data-i18n="explorer.subtitle">Browse and filter datasets</p>
    </div>

    <div class="explorer-layout">
      <!-- Sidebar Filters -->
      <aside class="explorer-sidebar">
        <!-- Data Type -->
        <div class="filter-group">
          <div class="filter-group-title" data-i18n="explorer.filterType">Data Type</div>
          <label class="filter-option">
            <input type="radio" name="filter-type" value="all" checked>
            <span data-i18n="explorer.allTypes">All Types</span>
          </label>
          <label class="filter-option">
            <input type="radio" name="filter-type" value="fixed">
            <span data-i18n="explorer.fixed">Fixed</span>
          </label>
          <label class="filter-option">
            <input type="radio" name="filter-type" value="live">
            <span data-i18n="explorer.live">Live Imaging</span>
          </label>
          <label class="filter-option">
            <input type="radio" name="filter-type" value="tracking">
            <span data-i18n="explorer.tracking">Tracking</span>
          </label>
        </div>

        <!-- Embryonic Stage (Dynamic) -->
        <div class="filter-group" id="filter-stage-group">
          <div class="filter-group-title" data-i18n="explorer.filterStage">Embryonic Stage</div>
          <label class="filter-option">
            <input type="radio" name="filter-stage" value="all" checked>
            <span data-i18n="explorer.allTypes">All Stages</span>
          </label>
          <!-- Populated by JS -->
        </div>

        <button class="btn btn-outline" style="margin-top: var(--space-4);" id="btn-clear-filters" data-i18n="explorer.clearFilters">
          Clear filters
        </button>
      </aside>

      <!-- Main Content -->
      <div class="explorer-main">
        <div class="explorer-header">
          <div class="explorer-search">
            <i data-lucide="search"></i>
            <input type="text" id="search-input" data-i18n-placeholder="app.search" placeholder="Search…">
          </div>

          <div class="explorer-controls">
            <div style="font-size: var(--text-sm); color: var(--text-muted);" id="results-count">
              <!-- e.g. 15 datasets -->
            </div>

            <!-- Sort By -->
            <select class="btn btn-outline" id="sort-select" style="padding-right: var(--space-8);">
              <option value="name_asc" data-i18n="explorer.sortName">Name (A-Z)</option>
              <option value="name_desc" data-i18n="explorer.sortName">Name (Z-A)</option>
              <option value="date_desc" data-i18n="explorer.sortDate">Newest First</option>
              <option value="stage_asc" data-i18n="explorer.filterStage">Stage (Earliest)</option>
            </select>

            <!-- View Toggles -->
            <div class="view-toggles">
              <button class="view-toggle active" id="btn-view-grid" data-i18n-title="explorer.viewGrid">
                <i data-lucide="layout-grid" style="width:18px;height:18px"></i>
              </button>
              <button class="view-toggle" id="btn-view-list" data-i18n-title="explorer.viewList">
                <i data-lucide="list" style="width:18px;height:18px"></i>
              </button>
            </div>
          </div>
        </div>

        <!-- Render Container -->
        <div id="dataset-container" class="dataset-grid">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>
  </main>

  <script src="js/core/utils.js?v=20260504"></script>
  <script src="js/core/ui-actions.js"></script>
  <script src="js/core/instance-config.js?v=20260706"></script>
  <script src="js/core/i18n.js?v=20260504"></script>
    <script src="js/core/theme.js?v=20260504"></script>
  <script src="js/core/colorblind.js?v=20260528" nonce="{{CSP_NONCE}}"></script>
  <script src="js/core/catalog.js?v=20260504"></script>
  <script src="js/core/download-manifest.js?v=20260504"></script>
  <script src="js/core/workspace-state.js?v=20260504"></script>
  <script src="js/core/export-manager.js?v=20260504"></script>
  <script src="js/pages/explorer.js?v=20260504"></script>
</body>
</html>
